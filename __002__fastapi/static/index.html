<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自动营销助手 · 头条发布</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      background: #0f1419;
      color: #e8eaed;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
    .image-source-group {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 4px;
    }
    @media (max-width: 520px) {
      .image-source-group { grid-template-columns: 1fr; }
    }
    .image-source-option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.5);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .image-source-option:hover:not(.is-disabled) {
      border-color: rgba(129, 140, 248, 0.45);
    }
    .image-source-option.is-selected {
      border-color: rgba(129, 140, 248, 0.65);
      background: rgba(99, 102, 241, 0.12);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.25);
    }
    .image-source-option.is-disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .image-source-option input {
      margin-top: 4px;
      accent-color: #818cf8;
      flex-shrink: 0;
    }
    .image-source-option .option-body { flex: 1; min-width: 0; }
    .image-source-option .option-title {
      font-size: 15px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 4px;
    }
    .image-source-option .option-desc {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="root">
    <p style="padding:48px 24px;text-align:center;color:#94a3b8;">页面加载中…</p>
  </div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    window.onerror = function (msg, _src, _line, _col, err) {
      var el = document.getElementById("root");
      if (el) {
        el.innerHTML =
          '<div style="max-width:560px;margin:48px auto;padding:24px;border-radius:12px;' +
          'background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);color:#fca5a5;">' +
          "<strong>页面脚本错误</strong><p style=\"margin-top:12px;line-height:1.6\">" +
          (err && err.message ? err.message : msg) +
          "</p><p style=\"margin-top:8px;font-size:13px;color:#94a3b8\">请按 F12 查看控制台，或强制刷新（Ctrl+F5）</p></div>";
      }
    };
  </script>
  <script type="text/babel" data-presets="react" src="/src/App.jsx?v=4"></script>
</body>
</html>
